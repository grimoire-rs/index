name: validate-pr

# Auto-merge gate for package announcements.
#
# Runs on pull_request_target so the merge step has write permissions.
# SAFETY CONTRACT: only the trusted base ref is executed; the PR head is
# fetched into ./pr-tree and consumed as DATA ONLY. Never run scripts,
# actions, or build steps from the PR checkout.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  actions: write # dispatch publish.yml after auto-merge

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch PR head as data
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --depth=1 origin "$HEAD_SHA"
          mkdir pr-tree
          git --work-tree=pr-tree checkout "$HEAD_SHA" -- index/ || true

      - name: List changed files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/files" \
            --paginate --jq '.[].filename' > changed.txt
          cat changed.txt

      - name: Validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_TREE: pr-tree
        run: |
          set -euo pipefail
          CHANGED_FILES="$(cat changed.txt)" python3 scripts/validate_pr.py

      - name: Auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --squash
          # GITHUB_TOKEN pushes skip push-triggered workflows; deploy explicitly.
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref main
