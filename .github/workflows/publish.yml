name: publish

on:
  push:
    branches: [main]
  # Auto-merges land via GITHUB_TOKEN, whose pushes do not retrigger
  # push workflows — validate-pr dispatches this workflow explicitly.
  workflow_dispatch:
  # Daily refresh as a safety net (missed dispatches, site dependencies).
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build index
        run: python3 scripts/build.py
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build site
        run: |
          npm ci --prefix site
          npm run build --prefix site
          cp -a site/dist/. dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
