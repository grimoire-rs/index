name: publish

on:
  push:
    branches: [main]
  # Auto-merges land via GITHUB_TOKEN, whose pushes do not retrigger
  # push workflows — validate-pr dispatches this workflow explicitly.
  workflow_dispatch:
  # Daily refresh as a safety net (missed dispatches, site dependencies).
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: ocx-sh/setup-ocx@8cd2f38eed07c9b79aaed22e61f9ba6b36e967a3 # v1.2.2
      - name: Build Pages artifact (index JSON + site)
        run: task build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
