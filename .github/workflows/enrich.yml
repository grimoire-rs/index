name: enrich

# Refresh the committed enrich/ sidecars from the live registry, then commit
# any change. publish.yml (push to main) auto-redeploys the site afterward.
# This is the only online workflow; test.yml and validate-pr.yml stay offline.

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * *" # daily, off-peak (before publish.yml's 04:17 refresh)

permissions:
  contents: write

concurrency:
  group: enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0

      # grim ships as an ocx package (ocx.sh/grim) but wiring it into the
      # project ocx.toml would dirty the offline lock that test.yml checks, so
      # install it standalone via the official (cargo-dist) installer instead.
      - name: Install grim
        env:
          GRIMOIRE_INSTALL_DIR: ${{ runner.temp }}/grim-bin
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://setup.grimoire.rs/sh \
            | sh -s -- --no-modify-path
          echo "$GRIMOIRE_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Refresh sidecars
        run: python3 scripts/enrich.py

      - name: Commit changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain enrich/)" ]; then
            echo "no enrichment changes"; exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add enrich/
          git commit -m 'chore(enrich): refresh registry sidecars'
          git push
