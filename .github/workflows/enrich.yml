name: enrich

# Refresh the committed enrich/ sidecars from the live registry, then commit
# any change and dispatch publish.yml (GITHUB_TOKEN pushes do not retrigger
# push workflows, same caveat validate-pr.yml handles).
# This is the only online workflow; test.yml and validate-pr.yml stay offline.

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * *" # daily, off-peak (before publish.yml's 04:17 refresh)

permissions:
  contents: write
  actions: write # dispatch publish.yml after the bot commit

concurrency:
  group: enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0

      # grim comes from ocx.toml like every other tool. ocx.lock pins it by
      # digest, which the offline jobs want; this is the one job driving the
      # live registry, so advance that single binding to today's `latest`
      # first. `ocx update <name>` resolves live and freezes every other pin,
      # so the deterministic toolchain test.yml checks is untouched. The lock
      # rewrite stays runner-local — the commit step only stages enrich/.
      - name: Refresh sidecars
        run: |
          set -euo pipefail
          ocx update grim --pull
          ocx run grim cpython -- python3 scripts/enrich.py

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain enrich/)" ]; then
            echo "no enrichment changes"; exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add enrich/
          git commit -m 'chore(enrich): refresh registry sidecars'
          git push
          # GITHUB_TOKEN pushes skip push-triggered workflows; deploy explicitly.
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref main
