name: test

# Offline self-checks for the validator scripts and a full artifact build
# (index JSON + site). Toolchain (task, node, python) is bootstrapped from
# ocx.toml by setup-ocx — same pins as local dev. Runs on script/site/build
# changes only — announcement PRs are gated by validate-pr.yml instead.

on:
  push:
    branches: [main]
    paths: [scripts/**, site/**, taskfile.yml, ocx.toml, ocx.lock]
  pull_request:
    paths: [scripts/**, site/**, taskfile.yml, ocx.toml, ocx.lock]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - name: Lock currency
        run: ocx lock --check
      - name: Verify (self-checks + build)
        run: task verify
